<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu brecha de retiro · Empowered Investor</title>
<!-- Favicon e imagen de preview: versión con fondo negro (se lee en pestaña/WhatsApp) -->
<link rel="icon" type="image/png" href="assets/logo-fondo-negro.png">
<link rel="apple-touch-icon" href="assets/logo-fondo-negro.png">
<meta property="og:title" content="Tu brecha de retiro · Empowered Investor">
<meta property="og:image" content="assets/logo-fondo-negro.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:image" content="assets/logo-fondo-negro.png">
<meta name="description" content="En 2 minutos: tu número de retiro proyectado, cuánto te da el Estado, cuánto podés construir invirtiendo y cuánto te falta. Gratis.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --tinta:#15191E; --menta:#63FCAF; --peri:#556DFB;
    --crema:#FEF9F3; --gris:#E2E2E2; --gris-sec:#9AA1AB;
    /* Semánticos (espejo del wizard Python) */
    --verde:#12b886; --rojo:#e0525a; --ambar:#e0a020; --azul:#4c7ef3; --tenue:#8a94a6;
    --card-bg:#1B2026; --card-bd:#262C34; --input-bd:#2E3540;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--tinta); color:var(--crema);
    font-family:'Bai Jamjuree',sans-serif; font-weight:300;
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%; max-width:560px; margin:0 auto; padding:14px 20px 70px;}

  /* Barra de progreso */
  .prog{position:sticky; top:0; z-index:20; background:var(--tinta); padding:12px 0 8px;}
  .prog-track{height:6px; background:#20262E; border-radius:999px; overflow:hidden;}
  .prog-fill{height:100%; background:var(--menta); border-radius:999px; transition:width .35s ease;}

  .marca{display:block; text-align:center; margin:8px 0 14px;}
  .marca img{width:150px; max-width:48%; height:auto;}

  .step{color:var(--gris-sec); font-size:12px; letter-spacing:.11em; text-transform:uppercase; font-weight:700; margin:6px 0 8px;}
  .hero{font-size:clamp(26px,7vw,34px); font-weight:700; line-height:1.15; letter-spacing:-.01em; margin:2px 0 4px;}
  .sub{color:var(--gris); font-size:17px; line-height:1.45; margin-bottom:16px; font-weight:400;}
  p, li{font-size:16px; line-height:1.5; font-weight:400;}
  b, strong{font-weight:600;}
  .note{color:var(--gris-sec); font-size:14px; line-height:1.5; margin:10px 0; font-weight:400;}

  .card{background:var(--card-bg); border:1px solid var(--card-bd); border-radius:16px; padding:18px 18px; margin:12px 0; font-size:15.5px; line-height:1.5;}
  .mini{background:var(--card-bg); border:1px solid var(--card-bd); border-radius:16px; padding:15px 15px; min-height:150px;}

  .big{font-size:clamp(34px,9vw,46px); font-weight:700; line-height:1.05; word-break:break-word;}
  .num{font-size:26px; font-weight:700; line-height:1.1;}
  .lbl{color:var(--gris-sec); font-size:14px; font-weight:500;}

  .campo{margin:14px 0;}
  .campo label{display:block; font-size:13px; font-weight:700; letter-spacing:.06em; color:var(--gris); margin-bottom:7px;}
  .campo input, .campo select{
    width:100%; background:var(--tinta); border:1px solid var(--input-bd); border-radius:12px;
    color:var(--crema); font-family:inherit; font-size:20px; font-weight:500; padding:13px 14px; outline:none;
  }
  .campo input:focus, .campo select:focus{border-color:var(--menta);}
  .campo .hint{font-size:12.5px; color:var(--gris-sec); margin-top:6px;}
  .row{display:flex; gap:12px;} .row>*{flex:1;}
  .eq{font-size:16px; font-weight:700; margin:4px 0 2px;}
  .eqs{font-size:13px; font-weight:600; color:var(--tenue); margin:2px 0 6px;}

  /* Radio de moneda / intención */
  .seg{display:flex; gap:8px;}
  .seg button{flex:1; background:var(--tinta); border:1px solid var(--input-bd); color:var(--crema); font-family:inherit;
    font-size:16px; font-weight:600; padding:12px; border-radius:12px; cursor:pointer;}
  .seg button.on{border-color:var(--menta); background:rgba(99,252,175,.10); color:var(--menta);}

  .opciones{display:flex; flex-direction:column; gap:10px; margin:10px 0;}
  .opcion{display:block; width:100%; text-align:left; background:var(--card-bg); border:1px solid var(--card-bd);
    color:var(--crema); font-family:inherit; font-size:15.5px; line-height:1.45; font-weight:400; padding:15px 16px;
    border-radius:14px; cursor:pointer; transition:border-color .12s ease;}
  .opcion.on{border-color:var(--menta); background:rgba(99,252,175,.08);}

  /* Botones */
  .btns{display:flex; gap:10px; margin-top:16px;}
  .btn{display:block; width:100%; text-align:center; cursor:pointer; border:none; border-radius:999px;
    font-family:inherit; font-size:17px; font-weight:700; padding:15px 18px; transition:transform .12s ease, opacity .12s;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--menta); color:var(--tinta);}
  .btn-ghost{background:transparent; color:var(--gris); border:1px solid var(--input-bd);}
  .btn-back{flex:0 0 auto; width:auto; padding:15px 18px;}
  a.btn{text-decoration:none;}

  /* Barras comparativas: etiqueta+valor completos arriba, barra proporcional debajo (nunca trunca) */
  .barwrap{margin:12px 0;}
  .barlbl{font-size:14.5px; font-weight:600; margin-bottom:6px; color:var(--crema); line-height:1.35;}
  .bartrack{height:14px; background:#20262E; border-radius:999px; overflow:hidden;}
  .barfill{height:100%; border-radius:999px; transition:width .4s ease;}

  /* Acordeón */
  details{background:var(--card-bg); border:1px solid var(--card-bd); border-radius:14px; margin:10px 0; overflow:hidden;}
  details>summary{cursor:pointer; list-style:none; padding:14px 16px; font-size:15px; font-weight:600; color:var(--crema);}
  details>summary::-webkit-details-marker{display:none;}
  details>summary::after{content:"▾"; float:right; color:var(--gris-sec);}
  details[open]>summary::after{content:"▴";}
  details .body{padding:2px 16px 16px; font-size:15px; line-height:1.5;}
  details .body img{max-width:100%; border-radius:8px; margin:8px 0; display:block;}
  details table{width:100%; border-collapse:collapse; margin:8px 0; font-size:13.5px;}
  details th, details td{border:1px solid var(--card-bd); padding:7px 8px; text-align:left;}
  details th{color:var(--gris-sec); font-weight:600;}
  .cap{color:var(--gris-sec); font-size:12px; line-height:1.5; margin-top:8px; display:block;}

  .warn{color:var(--ambar); font-size:14.5px; margin:10px 0; font-weight:500;}
  .divider{height:1px; background:var(--card-bd); margin:22px 0;}
  .checkline{display:flex; align-items:flex-start; gap:10px; margin:12px 0; font-size:15px;}
  .checkline input{width:20px; height:20px; margin-top:2px; accent-color:var(--menta);}

  #chart-wrap{position:relative; height:290px; width:100%; margin:6px 0 4px;}

  .foot-note{text-align:center; color:var(--tenue); font-size:14px; margin-top:26px; line-height:1.5;}
  .foot-note a{color:var(--azul); font-weight:700; text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="prog"><div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div></div>
  <div id="app"></div>
  <div class="foot-note" id="foot-note"></div>
  <div class="cap" style="text-align:center; margin-top:22px; border-top:1px solid var(--card-bd); padding-top:16px">
    Empowered Investor · Herramienta educativa, no es asesoría financiera individualizada ni una certificación de la CCSS.
    Los parámetros del IVM/ROP son los vigentes 2026 y las tasas están sujetas a verificación.
    <b>No se garantizan retornos. Los resultados pasados no garantizan resultados futuros.</b>
  </div>
</div>

<script src="js/calc.js"></script>
<script>
"use strict";
/* =====================================================================
 * wizard.html — funnel completo de retiro (Empowered Investor)
 * Replica el flujo del wizard de Streamlit (Calculadora_de_Retiro_Lead_Magnet.py)
 * con el MISMO copy. Motor de cálculo: js/calc.js (paridad en tests/paridad.md).
 * ===================================================================== */
var CFG = Calc.CFG;
var MARCA = "Empowered Investor";
var WHATSAPP_NUMERO = "50670558296";
var CALENDLY_URL = "https://calendly.com/empoweredinvestor/reunion-de-30-minutos";
var INSTAGRAM_URL = "https://www.instagram.com/joseinvestor.cr/";
var CALENDLY_TEL_PARAM = "a1";
var SJC_TASA_PCT = CFG.SJC_TASA_PCT;         // 8
var SETUP_FEE_USD = CFG.SETUP_FEE_USD;        // 2000
var FEE_ANUAL_PCT = CFG.FEE_ANUAL_PCT;        // 1
var TC_DEFAULT = CFG.TC_DEFAULT;              // 460
// Webhook (Apps Script) — misma URL que .streamlit/secrets.toml del proyecto Python.
var WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzpRcZk_r8ZR7Q6QrTc_mzlO4JSziwP3yzBivdgNAw6KWtUd4T5lwGt98uOSYIrtLzI/exec";

var VERDE="#12b886", ROJO="#e0525a", AMBAR="#e0a020", AZUL="#4c7ef3", TENUE="#8a94a6";

// Métricas Faber (espejo de FABER_STATS del Python)
var FABER = { bh:{cagr:10.8,maxdd:-50.8,calmar:0.21}, sma:{cagr:9.8,maxdd:-22.4,calmar:0.44} };
var FABER_PERIODO = "1993–2026";

// Orden real del flujo (para la barra de progreso)
var ORDEN = [0,1,2,4,3,41,42,5];

// ── Estado ────────────────────────────────────────────────────────────
var ss = { paso:0, datos:{}, tInicio:Date.now(), leadSig:null };
var d = ss.datos;

function guardar(){
  try{ sessionStorage.setItem("wz_state", JSON.stringify({paso:ss.paso, datos:ss.datos, tInicio:ss.tInicio})); }catch(e){}
}
function restaurar(){
  try{
    var raw = sessionStorage.getItem("wz_state");
    if(raw){ var o=JSON.parse(raw); ss.paso=o.paso||0; ss.datos=o.datos||{}; ss.tInicio=o.tInicio||Date.now(); d=ss.datos; }
  }catch(e){}
  // Parámetros precargados de la landing: ?edad=&salario=&meta= → saltar la portada al Paso 1.
  var qp = new URLSearchParams(location.search);
  if(qp.has("edad") || qp.has("salario") || qp.has("meta")){
    var edad = parseInt(qp.get("edad"),10);
    var salario = parseInt(qp.get("salario"),10);
    var meta = parseInt(qp.get("meta"),10);
    if(edad){ d.edad_hoy = edad; }
    if(salario){ d.salario = salario; d.sin_estado = false; } // vino salario → incluye el Estado (limpia un "sin_estado" viejo)
    if(meta){ d.ingreso_deseado = meta; d.moneda = d.moneda || "₡"; }
    if(!d.edad_ret) d.edad_ret = 65;
    if(edad || salario || meta){ ss.paso = 1; }   // saltar portada directo al Paso 1 con los valores puestos
    // Limpiar el query string tras consumirlo: refrescar no reinicia al Paso 1 ni re-siembra datos viejos.
    try{ history.replaceState(null, "", location.pathname); }catch(e){}
  }
}

function irA(paso){ ss.paso = paso; guardar(); window.scrollTo({top:0,behavior:"instant"}); render(); }

// ── Helpers de formato (espejo del Python) ────────────────────────────
function tc(){ var v = parseFloat(d.tc); return (v && v>0) ? v : TC_DEFAULT; }
function fmt(n){ return Math.round(n).toLocaleString("en-US"); }
function col(m){ return "₡"+fmt(m); }
function usd(m){ return "$"+fmt(m); }
function fmtMeta(mc){ return d.moneda==="$" ? "$"+fmt(mc/tc()) : "₡"+fmt(mc); }
function fmtMetaSec(mc){ return d.moneda==="$" ? "₡"+fmt(mc) : "$"+fmt(mc/tc()); }
function fmtMetaUsd(mu){ return d.moneda==="$" ? "$"+fmt(mu) : "₡"+fmt(mu*tc()); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function barra(valor, maximo, color, etiqueta){
  var pct = maximo<=0 ? 0 : Math.max(2, Math.min(100, valor/maximo*100));
  return '<div class="barwrap"><div class="barlbl">'+etiqueta+'</div>'
    + '<div class="bartrack"><div class="barfill" style="width:'+pct.toFixed(0)+'%;background:'+color+'"></div></div></div>';
}

// ── Calendly prefill (espejo del Python) ──────────────────────────────
function telE164cr(whats){
  var digits = String(whats||"").replace(/\D/g,"");
  if(!digits) return "";
  if(digits.indexOf("506")===0) return "+"+digits;
  if(digits.length===8) return "+506"+digits;
  return "+"+digits;
}
var A4_OBJETIVO = {
  "Acompañamiento":"Delegar el proceso porque estoy ocupado y quiero que alguien me ayude a abrir, estructurar y manejar la cuenta.",
  "Aprender":"Aprender sobre inversiones desde cero.",
  "Solo números":"No estoy seguro todavía, quiero entender qué opción tiene más sentido para mí.",
};
function a5Ingreso(salarioCol){
  if(salarioCol<=0) return "";
  var u = salarioCol/tc();
  if(u<2000) return "Menos de $2,000";
  if(u<3000) return "$2,000 a $3,000";
  if(u<6000) return "$3,000 a $6,000";
  return "Más de $6,000";
}
function a7Capacidad(capital, aporte){
  if(capital>=25000) return "Más de $25,000 disponibles";
  if(capital>=10000 || aporte>=500) return "$10,000–$25,000 y $500+/mes";
  if(capital>=5000 || aporte>=250) return "$5,000–$10,000, o puedo aportar $250–$500/mes";
  return "Menos de $5,000 y hasta $250/mes";
}
function calendlyPrefill(nombre, apellido, correo, whats, r, intencionCorto, corto){
  // corto=true → solo el prefill esencial (contacto). Se usa en el link del REPORTE PDF, donde
  // el URL se muestra como texto: sin las respuestas de opción múltiple (a4/a5/a7, que son frases
  // largas) el link queda corto y legible. El CTA dentro del wizard usa el prefill completo.
  var p = new URLSearchParams();
  p.set("utm_source", corto ? "reporte" : "wizard"); p.set("utm_content","calificado");
  if(nombre) p.set("first_name", nombre);
  if(apellido) p.set("last_name", apellido);
  if(correo) p.set("email", correo);
  var tel = telE164cr(whats);
  if(tel && CALENDLY_TEL_PARAM) p.set(CALENDLY_TEL_PARAM, tel);
  if(!corto){
    var obj = A4_OBJETIVO[intencionCorto]; if(obj) p.set("a4", obj);
    var ing = a5Ingreso(parseFloat(r.salario)||0); if(ing) p.set("a5", ing);
    var cap = a7Capacidad(parseFloat(r.capital)||0, parseFloat(r.aporte)||0); if(cap) p.set("a7", cap);
  }
  return CALENDLY_URL + "?" + p.toString();
}

// ── Webhook (Fase 2.5): text/plain para evitar el preflight CORS del Apps Script ──
function enviarLead(payload){
  try{
    fetch(WEBHOOK_URL, {
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=utf-8" },   // NO application/json (muere en preflight)
      body: JSON.stringify(payload)
    }).then(function(res){ return res.json(); }).then(function(j){
      if(j && j.ok){ console.log("lead ok", j); }
    }).catch(function(e){ /* nunca romper la experiencia por el webhook */ });
  }catch(e){}
}
var MESES_ES = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
var PERFIL_TEXTO = {
  "Crecimiento":"Tu brecha es grande, pero tenés tiempo. Esa combinación pide estrategias de crecimiento con riesgo administrado: más agresivas hoy, más conservadoras conforme te acercás al retiro.",
  "Balanceado":"Tu brecha es manejable y tu horizonte lo permite. Crecimiento con moderación, sin apuestas innecesarias.",
  "Conservador":"Estás cerca de tu meta o de tu retiro. La prioridad es proteger lo ganado y crecer sin sustos.",
};
function reporteSlides(r, nombre, apellido, correo, whats, intCorto){
  var hoy = new Date();
  var fecha = hoy.getDate()+" de "+MESES_ES[hoy.getMonth()]+" de "+hoy.getFullYear();
  var perfil = r.perfil;
  var veredicto = (r.totalMax >= r.desired)
    ? "Con lo que podés aportar y un poco de constancia, tu meta es alcanzable."
    : "Vas por buen camino. La diferencia se cierra con ajustes: aportar un poco más, mover un año el retiro o ajustar la meta.";
  return {
    nombre:nombre, apellido:apellido, fecha:fecha,
    meta_mensual:fmtMeta(r.desired), edad_retiro:String(parseInt(d.edad_ret||65,10)),
    pension_total:fmtMeta(r.pensionEstatal), brecha:fmtMeta(r.brecha),
    vf_mercado:"$"+fmt(r.vfMkt), vf_max:"$"+fmt(r.vfMax), total_proyectado:fmtMeta(r.totalMax),
    perfil_sugerido:perfil, veredicto_texto:veredicto, perfil_texto:PERFIL_TEXTO[perfil]||"",
    aporte_usd:"$"+fmt(r.aporte), aportado_total:"$"+fmt(r.aportado),
    link_calendly_utm:calendlyPrefill(nombre, apellido, correo, whats, r, intCorto, true),  // corto: link limpio para el PDF
  };
}
function tiempoTranscurrido(){ var s=Math.floor((Date.now()-ss.tInicio)/1000); return Math.floor(s/60)+" min "+(s%60)+" s"; }
function payloadLead(r, intencion, califica, etapa, extra){
  extra = extra || {};
  var inicioIso = new Date(ss.tInicio).toISOString();
  var curado = {
    inicio: inicioIso, timestamp: new Date().toISOString(),
    etapa: etapa, califica: !!califica,
    nombre: extra.nombre||"", apellido: extra.apellido||"", whatsapp: extra.whats||"", correo: extra.correo||"",
    intencion: intencion,
    edad_hoy: parseInt(d.edad_hoy||0,10), edad_retiro: parseInt(d.edad_ret||0,10),
    anios_para_retiro: r.anios,
    meta_col: Math.round(r.desired), meta_usd: Math.round(r.desired/tc()), moneda_meta: d.moneda||"",
    salario_col: Math.round(r.salario||0), cuotas_cot: r.cuotasCot||0,
    pension_estatal_col: Math.round(r.pensionEstatal),
    ivm_col: Math.round(r.ivmMonto), rop_col: Math.round(r.ropMonto),
    brecha_col: Math.round(r.brecha),
    capital_usd: Math.round(r.capital), aporte_usd: Math.round(r.aporte),
    perfil: r.perfil, tiempo_calculadora: d.tiempo_calculadora||"",
  };
  curado.json_completo = JSON.stringify({entrada: d, resultado: serializarResultado(r)});
  if(extra.reporte) curado.reporte = extra.reporte;
  return curado;
}
function serializarResultado(r){
  // copia liviana (sin objetos IVM/ROP anidados enormes) — equivalente al respaldo json_completo
  var o = {}; for(var k in r){ if(k==="ivmObj"||k==="ropObj") continue; o[k]=r[k]; } return o;
}

// ── Money input: formato en vivo con comas + placeholder sugerido ─────
function bindMoney(el){
  el.addEventListener("input", function(){
    var digits = el.value.replace(/[^0-9]/g,"");
    var pos = el.selectionStart, antes = el.value.length;
    el.value = digits ? Number(digits).toLocaleString("en-US") : "";
    var desp = el.value.length;
    try{ el.setSelectionRange(Math.max(0,pos+(desp-antes)), Math.max(0,pos+(desp-antes))); }catch(e){}
  });
}
function parseDinero(v){ var s=String(v||"").replace(/[^0-9.]/g,""); var n=parseFloat(s); return isNaN(n)?0:Math.max(0,n); }

// ── Progreso ──────────────────────────────────────────────────────────
function pintarProgreso(){
  var idx = ORDEN.indexOf(ss.paso); if(idx<0) idx=0;
  var pct = Math.round((idx)/(ORDEN.length-1)*100);
  document.getElementById("prog-fill").style.width = pct+"%";
}
function pintarFooter(){
  var f = document.getElementById("foot-note");
  if(ss.paso===5 || ss.paso===0){ f.innerHTML=""; return; }
  f.innerHTML = '¿Preferís saltarte la calculadora y ver tus números con nosotros directamente? '
    + '<a href="'+CALENDLY_URL+'" target="_blank" rel="noopener">Agendá una sesión de diagnóstico →</a>';
}

// ==============================================================================
// RENDER
// ==============================================================================
var chartInstance = null;
function render(){
  var app = document.getElementById("app");
  var p = ss.paso;
  if(p===0) app.innerHTML = viewPortada();
  else if(p===1) app.innerHTML = viewMeta();
  else if(p===2) app.innerHTML = viewEstado();
  else if(p===4) app.innerHTML = viewActo1();
  else if(p===3) app.innerHTML = viewCapacidad();
  else if(p===41) app.innerHTML = viewActo2();
  else if(p===42) app.innerHTML = viewActo3();
  else if(p===5) app.innerHTML = viewCaptura();
  pintarProgreso(); pintarFooter();
  wireStep();
}

// ---- PASO 0 · Portada ----
function viewPortada(){
  return ''
    + '<div class="marca"><img src="assets/logo-empowered.webp" alt="'+MARCA+'"></div>'
    + '<div class="hero">¿Vas a poder retirarte con lo que querés? 🎯</div>'
    + '<div class="sub">La mayoría no tiene ni idea de cuánto le va a dar la pensión. En 2 minutos te decimos tu número de retiro proyectado y cuánto te falta (o te sobra) para vivir el retiro que querés. Gratis y sin registrarte.<br>'
    + '<span style="font-size:15px">Pensado para profesionales que ganan bien pero nunca han visto este número.</span></div>'
    + '<div class="card">📊 1) Cuánto te va a dar el Estado por mes<br>📈 2) Cuánto podés llegar a tener si invertís<br>🎯 3) Cuánto te falta y cómo cerrarlo</div>'

function breakdownEstado(r){
  var ivm=r.ivmObj, rop=r.ropObj;
  var cuotasHoy=r.cuotasCot, mesesFut=r.anios*12;
  var h='<details><summary>🔍 ¿Cómo se calculó tu pensión del Estado? (IVM + ROP)</summary><div class="body">';
  h+='Tu pensión del Estado son <b>dos cheques</b> que se suman: el <b>IVM</b> (el fondo solidario de la CCSS) y el <b>ROP</b> (tu cuenta individual obligatoria). Acá se calculan con las mismas reglas que la calculadora completa de '+MARCA+':<br><br>';
  h+='<b>1️⃣ IVM, el cheque de la CCSS</b> · <i>Reglamento del Seguro de IVM, arts. 5, 23, 24 y 27</i><br>';
  h+='• <b>Cuotas:</b> '+fmt(cuotasHoy)+' que ya llevás (≈ '+(cuotasHoy/12).toFixed(0)+' años) + '+fmt(mesesFut)+' que faltan ('+r.anios+' años hasta tu retiro) = <b>'+fmt(ivm.cuotasTotales)+' cuotas</b>. El mínimo para la pensión completa son <b>300 cuotas (25 años)</b>.<br>';
  if(!ivm.cumpleRequisitos) h+='• <b>Resultado:</b> con '+fmt(ivm.cuotasTotales)+' cuotas no se llega ni al mínimo de <b>180</b> para una pensión proporcional → el IVM sale en <b>₡0</b>.<br>';
  else if(ivm.esProporcional) h+='• <b>Resultado:</b> llegás con '+fmt(ivm.cuotasTotales)+' cuotas (menos de 300) → <b>pensión proporcional</b>: el mismo % de una completa pero × <b>'+(ivm.factorProporcional*100).toFixed(0)+'%</b> (la fracción de las 300 que sí completaste).<br>';
  else h+='• <b>Resultado:</b> con '+fmt(ivm.cuotasTotales)+' cuotas superás las 300 → <b>pensión completa</b>.<br>';
  var extra="";
  if(ivm.cuantiaAdicionalPct>0) extra+=' + <b>'+ivm.cuantiaAdicionalPct.toFixed(1)+'%</b> por las cuotas sobre 300 (0.0833% c/u)';
  if(ivm.incrementoPostergacionPct>0) extra+=' + <b>'+ivm.incrementoPostergacionPct.toFixed(1)+'%</b> por postergación';
  h+='• <b>% que te reconocen (art. 24):</b> cuantía básica <b>'+ivm.cuantiaBasicaPct.toFixed(1)+'%</b> (según tu nivel salarial frente al salario mínimo legal)'+extra+' = <b>'+ivm.porcentajeReconocido.toFixed(1)+'%</b> de tu salario.<br>';
  h+='• <b>IVM = salario promedio '+col(r.salario)+' × '+ivm.porcentajeReconocido.toFixed(1)+'% = '+col(ivm.montoBruto)+'</b>, ajustado al piso ('+col(CFG.MONTO_MINIMO_DEFAULT)+') y techo ('+col(CFG.MONTO_MAXIMO_DEFAULT)+') vigentes 2026 → <b>'+col(ivm.montoMensual)+'/mes</b>.<br>';
  h+='💡 <b>Un dato que casi nadie sabe:</b> por más que trabajés o suba tu salario, la pensión del IVM tiene un <b>tope máximo</b>. Hoy (2026) ese techo es <b>'+col(CFG.MONTO_MAXIMO_DEFAULT)+'/mes</b>. No importa cuánto cotizés: el IVM no paga más que eso. Una razón más para construir tu propio ingreso por fuera.<br><br>';
  h+='<b>2️⃣ ROP, tu cuenta individual</b> · <i>Ley de Protección al Trabajador N.º 7983, art. 22</i><br>';
  var mod = rop.modalidadAplicable==="transitoria" ? "régimen transitorio, en cuotas iguales" : "renta mensual (retiro programado)";
  h+='• No es un % del salario: es la <b>plata acumulada en tu cuenta personal</b> (una alcancía obligatoria que invierte tu operadora). Al pensionarte te la devuelven poco a poco.<br>';
  h+='• <b>Saldo proyectado al retiro</b> (en poder de compra de hoy): <b>'+col(rop.saldoProyectado)+'</b>, entregado como '+mod+' → <b>'+col(rop.ingresoMensualAplicable)+'/mes</b>.<br>';
  h+='<b>➕ Total del Estado = '+col(ivm.montoMensual)+' (IVM) + '+col(rop.ingresoMensualAplicable)+' (ROP) = '+col(r.pensionEstatal)+'/mes.</b><br>';
  h+='<span class="cap">Guía educativa con la normativa vigente (valores 2026), no una certificación oficial de la CCSS. El monto real lo define la CCSS al momento de tu pensión.</span>';
  h+='</div></details>';
  return h;
}

function wireRamaA(){
  var els = { nombre:byId("f-nombre"), apellido:byId("f-apellido"), whats:byId("f-whats"), correo:byId("f-correo") };
  function persist(){ d._nombre=els.nombre.value; d._apellido=els.apellido.value; d._whats=els.whats.value; d._correo=els.correo.value; guardar(); }
  function datos(){ return { nombre:els.nombre.value.trim(), apellido:els.apellido.value.trim(), whats:els.whats.value.trim(), correo:els.correo.value.trim() }; }
  function datosOk(v){ return !!(v.nombre && v.apellido && v.whats && v.correo && v.correo.indexOf("@")>-1); }

  // Envía el lead al Sheet + dispara el reporte. Se llama SOLO desde un click deliberado (botón del
  // reporte o botón de agendar), NUNCA mientras se escribe. Dedupe por firma → no duplica en reintentos.
  function enviarReporte(){
    var v = datos();
    if(!datosOk(v)){
      var w=byId("warn5"); if(w){ w.style.display="block"; w.textContent="Completá tus 4 datos con un correo válido y te enviamos tu Reporte Completo."; }
      return null;
    }
    var r = Calc.calcular(d);
    var intCorto = d.intencion;
    d.tiempo_calculadora = tiempoTranscurrido();
    var sig = "A|"+v.nombre+"|"+v.apellido+"|"+v.whats+"|"+v.correo+"|"+intCorto;
    if(ss.leadSig !== sig){
      var rep = reporteSlides(r, v.nombre, v.apellido, v.correo, v.whats, intCorto);
      enviarLead(payloadLead(r, intCorto, true, "reporte_solicitado", {nombre:v.nombre, apellido:v.apellido, whats:v.whats, correo:v.correo, reporte:rep}));
      ss.leadSig = sig; guardar();
    }
    return v;
  }

  function refresh(){
    persist();   // solo guarda lo tecleado en sessionStorage (para no reescribir si vuelve); NO envía nada
    var r = Calc.calcular(d);
    var v = datos();
    var intCorto = d.intencion;
    var ok = datosOk(v);
    var ctaRep = byId("cta-reporte"), ctaInt = byId("cta-intencion");

    // Botón del reporte: SIEMPRE un <button> (no un enlace), así el envío ocurre en el click y recién
    // ahí se abre WhatsApp. Mientras se escribe, nada se manda al Sheet.
    ctaRep.innerHTML = '<button class="btn btn-primary" id="b5-rep">📕 Enviame mi Reporte Completo →</button>'
      + '<div id="warn5" class="warn" style="display:none"></div>'
      + (ok ? '<div class="cap">Al tocar el botón te lo enviamos al correo y se abre WhatsApp por si lo querés pedir también por ahí.</div>' : '');
    byId("b5-rep").addEventListener("click", function(){
      var ok2 = enviarReporte();
      if(ok2){
        var msg = "Hola, soy "+ok2.nombre+" "+ok2.apellido+". Quisiera que me mandaran por aquí mi Reporte Completo de Retiro.";
        window.open("https://wa.me/"+WHATSAPP_NUMERO+"?text="+encodeURIComponent(msg), "_blank");
      }
    });

    // CTA condicional por intención (Calendly). Solo aparece con datos válidos. Al hacer click también
    // registra el lead (deduped) — así cualquier acción deliberada lo captura, pero escribir no.
    if(ok){
      var calUrl = calendlyPrefill(v.nombre, v.apellido, v.correo, v.whats, r, intCorto);
      if(intCorto==="Acompañamiento"){
        ctaInt.innerHTML = '<div class="card" style="border-color:'+VERDE+'">Perfecto: <b>eso es exactamente lo que hacemos</b>. Te guiamos paso a paso en la apertura y el fondeo de tu cuenta, y la estrategia y el manejo corren por nuestra cuenta. Agendá tu <b>sesión de diagnóstico</b> (30 min, sin costo ni compromiso). Revisamos tus números juntos y te decimos con honestidad <b>si tu caso es para nosotros o no</b>.</div>'
          + '<a class="btn btn-primary" id="b5-cal" href="'+calUrl+'" target="_blank" rel="noopener">📞 Agendar mi sesión de diagnóstico</a>';
      } else {
        ctaInt.innerHTML = '<div class="card">Tu <b>Reporte Completo</b> te llega igual, <b>sin compromiso</b>. Y si en algún momento querés que veamos tus números juntos, la puerta está abierta:</div>'
          + '<a class="btn btn-ghost" id="b5-cal" href="'+calUrl+'" target="_blank" rel="noopener">📞 Agendar una sesión de diagnóstico</a>';
      }
      var lk = byId("b5-cal"); if(lk){ lk.addEventListener("click", function(){ enviarReporte(); }); } // captura al agendar (deduped)
    } else {
      ctaInt.innerHTML = "";
    }
  }
  ["nombre","apellido","whats","correo"].forEach(function(k){ els[k].addEventListener("input", refresh); });
  refresh();
}

function byId(id){ return document.getElementById(id); }
function wireStep(){
  // navegación por data-go
  Array.prototype.forEach.call(document.querySelectorAll("[data-go]"), function(el){
    el.addEventListener("click", function(){ irA(parseInt(el.getAttribute("data-go"),10)); });
  });
  var p = ss.paso;
  if(p===1) wireMeta();
  else if(p===2) wireEstado();
  else if(p===3) wireCapacidad();
  else if(p===41) drawChart();
  else if(p===5) wireCaptura();
}

function wireMeta(){
  var goal=byId("f-goal"), tcEl=byId("f-tc");
  bindMoney(goal); if(tcEl) bindMoney(tcEl);
  function segActual(){ var b=document.querySelector("#seg-moneda button.on"); return b?b.getAttribute("data-m"):"₡"; }
  function updEq(){
    var tcv = parseDinero(tcEl?tcEl.value:"")||TC_DEFAULT;
    var m = parseDinero(goal.value);
    var esUsd = segActual()==="$";
    var ic = esUsd ? m*tcv : m;
    byId("goal-eq").innerHTML = '= ₡'+fmt(ic)+' <span style="color:'+TENUE+'">·</span> $'+fmt(ic/Math.max(tcv,1))+' <span class="lbl">por mes</span>';
  }
  goal.addEventListener("input", updEq); if(tcEl) tcEl.addEventListener("input", updEq);
  // toggle moneda: reconvierte el valor mostrado
  Array.prototype.forEach.call(document.querySelectorAll("#seg-moneda button"), function(b){
    b.addEventListener("click", function(){
      var nuevo=b.getAttribute("data-m"), actual=segActual();
      if(nuevo===actual) return;
      var tcv=parseDinero(tcEl?tcEl.value:"")||TC_DEFAULT;
      var prev=parseDinero(goal.value);
      if(prev>0){ goal.value = (nuevo==="$" ? Math.round(prev/Math.max(tcv,1)) : Math.round(prev*tcv)).toLocaleString("en-US"); }
      document.querySelectorAll("#seg-moneda button").forEach(function(x){ x.classList.remove("on"); });
      b.classList.add("on");
      // actualizar label/placeholder de la meta
      var lbl = byId("f-goal").previousElementSibling; // no aplica; re-render simple:
      updEq();
    });
  });
  updEq();
  byId("b1-next").addEventListener("click", function(){
    var edad=parseInt(parseDinero(byId("f-edad").value),10)||0;
    var edadRet=parseInt(parseDinero(byId("f-edadret").value),10)||0;
    var esUsd=segActual()==="$";
    var tcv=parseDinero(tcEl?tcEl.value:"")||TC_DEFAULT;
    var m=parseDinero(goal.value);
    if(edad<18) edad=18; if(edad>75) edad=75;
    if(edadRet<=edad) edadRet=edad+1; if(edadRet>80) edadRet=80;
    if(m<=0){ byId("warn-meta").style.display="block"; return; }
    d.edad_hoy=edad; d.edad_ret=edadRet; d.ingreso_deseado = esUsd ? m*tcv : m;
    d.moneda = esUsd ? "$" : "₡"; d.tc = tcv;
    irA(2);
  });
}

function wireEstado(){
  var chk=byId("f-sinestado");
  function rewire(){
    var sal=byId("f-salario"), cuo=byId("f-cuotas"), sr=byId("f-saldorop");
    if(sal){ bindMoney(sal); }
    if(sr){ bindMoney(sr); }
    if(cuo){
      cuo.addEventListener("input", function(){ cuo.value=cuo.value.replace(/[^0-9]/g,"").slice(0,3); updCuotas(); });
      updCuotas();
    }
    function updCuotas(){
      var eq=byId("cuotas-eq"); if(!eq||!cuo) return;
      var c=parseInt(cuo.value,10)||0;
      eq.innerHTML = '≈ '+(c/12).toFixed(1)+' años cotizados · el mínimo para la pensión completa son 300 cuotas (25 años)';
    }
  }
  rewire();
  chk.addEventListener("change", function(){
    d.sin_estado = chk.checked;
    // re-render del bloque
    byId("app").innerHTML = viewEstado(); pintarProgreso(); wireStep();
  });
  byId("b2-next").addEventListener("click", function(){
    var sinEstado = byId("f-sinestado").checked;
    if(sinEstado){ d.sin_estado=true; d.salario=0; d.cuotas_cot=0; d.saldo_rop=0; irA(4); return; }
    var salario=parseDinero(byId("f-salario").value);
    var cuotas=parseInt(byId("f-cuotas").value,10)||0;
    var saldo=parseDinero(byId("f-saldorop").value);
    if(salario<=0){ byId("warn-estado").style.display="block"; return; }
    d.sin_estado=false; d.salario=salario; d.cuotas_cot=cuotas; d.saldo_rop=saldo;
    irA(4);
  });
}

function wireCapacidad(){
  var cap=byId("f-cap"), ap=byId("f-ap");
  bindMoney(cap); bindMoney(ap);
  function updEq(){
    byId("cap-eq").innerHTML = '≈ ₡'+fmt(parseDinero(cap.value)*tc());
    byId("ap-eq").innerHTML = '≈ ₡'+fmt(parseDinero(ap.value)*tc());
  }
  cap.addEventListener("input", updEq); ap.addEventListener("input", updEq); updEq();
  byId("b3-next").addEventListener("click", function(){
    var capital=parseDinero(cap.value), aporte=parseDinero(ap.value);
    if(aporte<=0){ byId("warn-cap").style.display="block"; return; }
    d.capital=capital; d.aporte=aporte;   // capital 0 es válido
    irA(41);
  });
}

function wireCaptura(){
  Array.prototype.forEach.call(document.querySelectorAll("#opciones .opcion"), function(b){
    b.addEventListener("click", function(){
      d.intencion = b.getAttribute("data-int"); guardar();
      document.querySelectorAll("#opciones .opcion").forEach(function(x){ x.classList.remove("on"); });
      b.classList.add("on");
      renderRama();
    });
  });
  if(d.intencion) renderRama();
}

// ── Chart.js (Acto 2) — cargado desde cdnjs solo cuando se necesita ───
function drawChart(){
  var r = Calc.calcular(d);
  function build(){
    var ctx = byId("chart-crec"); if(!ctx || typeof Chart==="undefined") return;
    var xs = r.serieMarket.map(function(p){ return p[0]; });
    var ap = r.serieAportado.map(function(p){ return Math.round(p[1]); });
    var ym = r.serieMarket.map(function(p){ return Math.round(p[1]); });
    var y15 = r.serieA15.map(function(p){ return Math.round(p[1]); });
    if(chartInstance){ chartInstance.destroy(); }
    chartInstance = new Chart(ctx, {
      type:"line",
      data:{ labels:xs, datasets:[
        { label:"Dinero aportado", data:ap, borderColor:TENUE, borderWidth:2, borderDash:[6,4], pointRadius:0, tension:.15 },
        { label:"Portafolio de Crecimiento", data:y15, borderColor:VERDE, backgroundColor:"rgba(18,184,134,0.20)", borderWidth:3.5, pointRadius:0, fill:true, tension:.15 },
        { label:"Portafolio Básico", data:ym, borderColor:AZUL, borderWidth:3, pointRadius:0, tension:.15 },
      ]},
      options:{ responsive:true, maintainAspectRatio:false,
        // Forzar render a >=2x: en pantallas con escalado fraccional (Windows 125/150%) Chart.js
        // dibujaría a DPR 1.25/1.5 y se ve borroso. Redondeamos hacia arriba, mínimo 2x → siempre nítido.
        devicePixelRatio: Math.max(2, Math.ceil(window.devicePixelRatio || 1)),
        interaction:{mode:"index",intersect:false},
        plugins:{ legend:{labels:{color:"#E2E2E2",boxWidth:14,font:{size:11}}},
          tooltip:{callbacks:{ title:function(it){return "Edad "+it[0].label;}, label:function(it){ return it.dataset.label+": $"+Number(it.raw).toLocaleString("en-US"); }}}},
        scales:{ x:{title:{display:true,text:"Edad",color:TENUE}, ticks:{color:TENUE}, grid:{color:"rgba(140,150,170,0.18)"}},
          y:{ ticks:{color:TENUE, callback:function(v){ return "$"+(v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?(v/1e3).toFixed(0)+"k":v); }}, grid:{color:"rgba(140,150,170,0.22)"}}}}
    });
  }
  if(typeof Chart==="undefined"){
    var s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js";
    s.onload=build; s.onerror=function(){ var w=byId("chart-wrap"); if(w) w.innerHTML='<div class="note">📈 (gráfico no disponible sin conexión)</div>'; };
    document.head.appendChild(s);
  } else { build(); }
}

// ── Init ──────────────────────────────────────────────────────────────
restaurar();
guardar();   // persistir de una lo que vino de la landing (sobrevive un refresh inmediato)
render();
</script>
